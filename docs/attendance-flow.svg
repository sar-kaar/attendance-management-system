<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="720" fill="#FFFFFF"/>

<text x="40" y="34" font-size="14" font-weight="700" fill="#2C2C2A">1. Login</text>

<g stroke="#534AB7" stroke-width="1" fill="#EEEDFE">
<rect x="40" y="46" width="600" height="44" rx="8"/>
</g>
<text x="340" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">User submits credentials</text>
<text x="340" y="80" text-anchor="middle" font-size="10" fill="#534AB7">POST /api/auth/login/</text>
<line x1="340" y1="90" x2="340" y2="110" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g stroke="#534AB7" stroke-width="1" fill="#EEEDFE">
<rect x="40" y="112" width="600" height="44" rx="8"/>
</g>
<text x="340" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">SimpleJWT verifies against accounts_user</text>
<text x="340" y="146" text-anchor="middle" font-size="10" fill="#534AB7">checks username / hashed password</text>
<line x1="340" y1="156" x2="340" y2="176" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g stroke="#639922" stroke-width="1" fill="#EAF3DE">
<rect x="40" y="178" width="600" height="44" rx="8"/>
</g>
<text x="340" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#27500A">Access + refresh JWT returned</text>
<text x="340" y="212" text-anchor="middle" font-size="10" fill="#3B6D11">access: 1 day · refresh: 7 days</text>

<line x1="340" y1="222" x2="340" y2="260" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<text x="40" y="280" font-size="14" font-weight="700" fill="#2C2C2A">2. Mark attendance</text>

<g stroke="#534AB7" stroke-width="1" fill="#EEEDFE">
<rect x="40" y="292" width="600" height="44" rx="8"/>
</g>
<text x="340" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Faculty submits attendance record(s)</text>
<text x="340" y="326" text-anchor="middle" font-size="10" fill="#534AB7">POST /api/attendance/ or /mark_bulk/</text>
<line x1="340" y1="336" x2="340" y2="356" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g stroke="#378ADD" stroke-width="1" fill="#E6F1FB">
<rect x="40" y="358" width="600" height="44" rx="8"/>
</g>
<text x="340" y="376" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">JWT validated, role checked (admin / faculty)</text>
<line x1="340" y1="402" x2="340" y2="422" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g stroke="#BA7517" stroke-width="1" fill="#FAEEDA">
<rect x="40" y="424" width="600" height="44" rx="8"/>
</g>
<text x="340" y="442" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Enrollment check: student active in Enrollment for course?</text>
<text x="340" y="458" text-anchor="middle" font-size="10" fill="#854F0B">AttendanceSerializer.validate() / mark_bulk filter</text>

<line x1="220" y1="468" x2="150" y2="500" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="140" y="490" text-anchor="middle" font-size="10" fill="#5F5E5A">no</text>
<line x1="460" y1="468" x2="530" y2="500" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="540" y="490" text-anchor="middle" font-size="10" fill="#5F5E5A">yes</text>

<g stroke="#E24B4A" stroke-width="1" fill="#FCEBEB">
<rect x="20" y="502" width="240" height="56" rx="8"/>
</g>
<text x="140" y="524" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F">Record rejected / skipped</text>
<text x="140" y="540" text-anchor="middle" font-size="10" fill="#A32D2D">returned in "skipped" list</text>

<g stroke="#639922" stroke-width="1" fill="#EAF3DE">
<rect x="420" y="502" width="240" height="56" rx="8"/>
</g>
<text x="540" y="524" text-anchor="middle" font-size="12" font-weight="600" fill="#27500A">Attendance row saved</text>
<text x="540" y="540" text-anchor="middle" font-size="10" fill="#3B6D11">unique (student, course, date)</text>

<line x1="540" y1="558" x2="540" y2="590" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g stroke="#0F6E56" stroke-width="1" fill="#E1F5EE">
<rect x="420" y="592" width="240" height="44" rx="8"/>
</g>
<text x="540" y="610" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Response returned to frontend</text>
<text x="540" y="626" text-anchor="middle" font-size="10" fill="#0F6E56">saved + skipped list, if bulk</text>

<text x="340" y="700" text-anchor="middle" font-size="11" fill="#5F5E5A">Attendance Management System — login + mark-attendance flow (Day 4, enrollment-gated)</text>
</svg>
