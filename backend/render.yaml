services:
  - type: web
    name: ams-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-url.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ams-db
          property: connectionString
    autoDeploy: true
    healthCheckPath: /admin/

databases:
  - name: ams-db
    plan: free
    databaseName: ams
