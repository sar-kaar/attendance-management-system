<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Wireframe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: white; border-radius: 12px; padding: 48px; width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
p { color: #666; margin-bottom: 32px; font-size: 14px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 6px; }
input { width: 100%; padding: 10px 14px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 14px; outline: none; }
input:focus { border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.1); }
.btn { width: 100%; padding: 12px; background: #4a90d9; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn:hover { background: #3a7bc8; }
.links { text-align: center; margin-top: 20px; }
.links a { color: #4a90d9; text-decoration: none; font-size: 13px; margin: 0 8px; }
.logo { text-align: center; margin-bottom: 32px; }
.logo div { width: 48px; height: 48px; background: #4a90d9; border-radius: 12px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div>A</div>
    <h1>Attendance System</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" placeholder="Enter your username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="Enter your password">
  </div>
  <button class="btn">Sign In</button>
  <div class="links">
    <a href="#">Forgot password?</a>
    <a href="#">Create account</a>
  </div>
</div>
</body>
</html>
