stages:
  - test
  - build
  - deploy

variables:
  AZURE_RESOURCE_GROUP: ams-rg
  AZURE_WEBAPP_NAME: ams-backend
  AZURE_STORAGE_ACCOUNT: amsfrontendweb

test:
  stage: test
  image: python:3.11
  variables:
    SECRET_KEY: ci-test-secret-key-not-for-production
    DEBUG: "True"
    ALLOWED_HOSTS: localhost,127.0.0.1
    CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key:
      files:
        - backend/requirements.txt
    paths:
      - .cache/pip
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install --no-deps face-recognition==1.3.0
  script:
    - python manage.py makemigrations --check
    - python manage.py check
    - python manage.py test --verbosity=2
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build-frontend:
  stage: build
  image: node:20
  variables:
    VITE_API_URL: "https://ams-backend.azurewebsites.net/api"
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - test

deploy-backend:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  script:
    - az login --service-principal --username "$AZURE_CLIENT_ID" --password="$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - |
      # Sync mail/OTP config from GitLab CI/CD variables into App Service
      # settings. The values are never written here - they come from the
      # masked project variables at runtime, so nothing secret is committed.
      #
      # Guarded on EMAIL_HOST_PASSWORD being set: if the variable is missing
      # (or is unavailable because it is Protected and this branch is not),
      # skip rather than overwrite the live app settings with empty strings
      # and silently break OTP email.
      if [ -n "$EMAIL_HOST_PASSWORD" ]; then
        echo "Syncing email settings to App Service..."
        az webapp config appsettings set \
          --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" \
          --settings \
            EMAIL_HOST="$EMAIL_HOST" \
            EMAIL_PORT="$EMAIL_PORT" \
            EMAIL_USE_TLS="$EMAIL_USE_TLS" \
            EMAIL_HOST_USER="$EMAIL_HOST_USER" \
            EMAIL_HOST_PASSWORD="$EMAIL_HOST_PASSWORD" \
            DEFAULT_FROM_EMAIL="$DEFAULT_FROM_EMAIL" \
            OTP_EXPIRY_MINUTES="${OTP_EXPIRY_MINUTES:-10}" \
            OTP_RESEND_COOLDOWN_SECONDS="${OTP_RESEND_COOLDOWN_SECONDS:-60}" \
          --output none
        echo "Email settings synced."
      else
        echo "EMAIL_HOST_PASSWORD not set - skipping email settings sync."
      fi
    - python3 -c "import shutil; shutil.make_archive('backend', 'zip', 'backend')"
    - |
      # Azure's front door enforces a fixed ~230s limit on the synchronous
      # HTTP call `az webapp deploy` makes, regardless of --timeout - Oryx
      # keeps rebuilding numpy/pandas/dlib-bin on the B1 instance in the
      # background and the deploy succeeds seconds later, but the CLI call
      # itself already got cut with an HTTP 504. Raising --timeout does not
      # help because it governs the CLI's own wait, not this front-door limit.
      #
      # --async returns immediately after the zip is uploaded, then we poll
      # the deployment log ourselves. LAST_LINE is the log length BEFORE this
      # deploy starts, so the poll only looks at entries strictly after it -
      # otherwise a leftover "Deployment successful" from the PREVIOUS deploy
      # would be misread as this one finishing instantly.
      LAST_LINE=$(az webapp log deployment show --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --query "length(@)" -o tsv)
      az webapp deploy --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --src-path backend.zip --type zip --async true
      echo "Deploy triggered (async). Polling for completion (baseline: $LAST_LINE log lines)..."
      for i in $(seq 1 60); do
        sleep 15
        NEW=$(az webapp log deployment show --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --query "[${LAST_LINE}:].message" -o tsv 2>/dev/null)
        [ -n "$NEW" ] && echo "$NEW"
        if echo "$NEW" | grep -q "Deployment successful"; then
          echo "Deployment confirmed successful."
          exit 0
        fi
        if echo "$NEW" | grep -qi "Deployment failed\|^ERROR:"; then
          echo "Deployment failed - see log above."
          exit 1
        fi
      done
      echo "Timed out after 15 min waiting for deployment confirmation."
      exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - test

deploy-frontend:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  script:
    - az login --service-principal --username "$AZURE_CLIENT_ID" --password="$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - az storage blob upload-batch --account-name "$AZURE_STORAGE_ACCOUNT" --destination '$web' --source frontend/dist --auth-mode login --overwrite
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build-frontend
